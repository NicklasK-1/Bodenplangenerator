<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grundriss-Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f3efe6; --paper-2:#ece7da;
  --ink:#2a2a31; --accent:#d9743b; --blue:#2f6f8f;
  --panel:#1c1f25; --panel-2:#23272f; --txt:#e9ecf1; --txt-dim:#9aa3b2;
  --btn:#2a2f38; --btn-hover:#343b46;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'IBM Plex Sans',system-ui,sans-serif;color:var(--txt);background:var(--panel);overflow:hidden}
.app{display:grid;grid-template-columns:64px 1fr 290px;grid-template-rows:48px 1fr;height:100%}
.topbar{grid-column:1/4;display:flex;align-items:center;gap:18px;padding:0 16px;background:var(--panel);border-bottom:1px solid #00000040}
.brand{font-weight:600;letter-spacing:.5px}.brand span{color:var(--accent)}
.readout{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--txt-dim);display:flex;gap:18px;margin-left:auto}
.readout b{color:var(--txt);font-weight:500}
.hint{font-size:11.5px;color:var(--txt-dim)}
.tools{background:var(--panel);border-right:1px solid #00000040;display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 0;overflow-y:auto}
.tool{width:44px;height:44px;min-height:44px;border-radius:10px;border:1px solid transparent;background:var(--btn);color:var(--txt);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;transition:.12s}
.tool:hover{background:var(--btn-hover)}
.tool.active{background:var(--accent);color:#1a1308;box-shadow:0 0 0 2px #d9743b55}
.tool svg{width:22px;height:22px;stroke-width:1.7}
.tool .kbd{position:absolute;bottom:2px;right:4px;font-size:9px;font-family:'IBM Plex Mono',monospace;opacity:.55}
.tool-sep{width:30px;height:1px;background:#ffffff14;margin:3px 0;flex:none}
.stage{position:relative;background:var(--paper);overflow:hidden}
#c{display:block;width:100%;height:100%;cursor:crosshair}
.stage.select #c{cursor:default}.stage.panning #c{cursor:grabbing}
.zoombar{position:absolute;left:12px;bottom:12px;display:flex;gap:4px;background:#1c1f25cc;backdrop-filter:blur(6px);border-radius:9px;padding:4px}
.zoombar button{width:30px;height:28px;border:none;border-radius:6px;background:#2a2f38;color:#e9ecf1;cursor:pointer;font-size:15px}
.zoombar button:hover{background:#343b46}
.zoombar .z{display:flex;align-items:center;padding:0 8px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--txt-dim)}
.panel{background:var(--panel);border-left:1px solid #00000040;overflow-y:auto;padding:14px}
.sec{margin-bottom:18px}
.sec h3{font-size:11px;text-transform:uppercase;letter-spacing:1.2px;color:var(--txt-dim);margin-bottom:10px;font-weight:600}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:9px;font-size:13px}
.row label{color:var(--txt-dim)}
input[type=number]{width:78px;background:var(--panel-2);border:1px solid #ffffff14;color:var(--txt);border-radius:7px;padding:6px 8px;font-family:'IBM Plex Mono',monospace;font-size:12.5px}
input[type=number]:focus{outline:none;border-color:var(--accent)}
input[type=color]{width:34px;height:28px;border:none;background:none;padding:0;border-radius:6px;cursor:pointer}
.toggle{position:relative;width:40px;height:22px;border-radius:20px;background:#3a414c;cursor:pointer;transition:.15s;flex:none}
.toggle.on{background:var(--accent)}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s}
.toggle.on::after{transform:translateX(18px)}
.btn{width:100%;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:500;cursor:pointer;background:var(--btn);color:var(--txt);transition:.12s;margin-bottom:7px;font-family:inherit}
.btn:hover{background:var(--btn-hover)}
.btn.primary{background:var(--accent);color:#1a1308}.btn.primary:hover{filter:brightness(1.07)}
.btn.danger{background:#3a2a2a;color:#e7a59c}.btn.danger:hover{background:#4a3030}
.btn-row{display:flex;gap:7px}.btn-row .btn{margin-bottom:0}
.selinfo{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--txt-dim);line-height:1.7;background:var(--panel-2);border-radius:8px;padding:10px;margin-bottom:10px}
.selinfo b{color:var(--txt)}
.empty-sel{font-size:12px;color:#5c6470;font-style:italic}
.miniseg{display:flex;gap:6px;margin-bottom:9px}
.miniseg button{flex:1;border:1px solid #ffffff14;background:var(--panel-2);color:var(--txt-dim);border-radius:7px;padding:7px;font-size:12px;cursor:pointer}
.miniseg button.on{background:var(--accent);color:#1a1308;border-color:transparent}
.lvl-item{padding:8px 10px;border-radius:7px;background:var(--panel-2);margin-bottom:5px;cursor:pointer;font-size:13px;border:1px solid transparent;user-select:none}
.lvl-item:hover{background:#2c313b}
.lvl-item.active{border-color:var(--accent);color:#fff}
.lvl-item.active::before{content:"▸ ";color:var(--accent)}


#text-editor{position:absolute;z-index:50;pointer-events:none;transform-origin:0 0}
#text-editor input{pointer-events:all;background:transparent;border:none;border-bottom:2px solid #d9743b;outline:none;font-family:'IBM Plex Sans',sans-serif;padding:0 2px;margin:0;min-width:80px;color:#2a2a31}

.sym-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:40px 20px;backdrop-filter:blur(3px)}
.sym-overlay.open{display:flex}
.sym-panel{background:#1c1f25;border:1px solid #3a3f4a;border-radius:14px;width:min(96vw,1100px);height:min(85vh,700px);display:grid;grid-template-rows:54px 1fr;overflow:hidden;box-shadow:0 24px 80px #00000088}
.sym-topbar{display:flex;align-items:center;gap:12px;padding:0 16px;border-bottom:1px solid #2e333d;background:#161921}
.sym-topbar h2{font-size:14px;font-weight:600;color:#e9ecf1;white-space:nowrap}
.sym-topbar input{flex:1;background:#23272f;border:1px solid #3a3f4a;border-radius:8px;color:#e9ecf1;padding:7px 12px;font-size:13px}
.sym-topbar input:focus{outline:none;border-color:#d9743b}
.sym-topbar button{background:none;border:none;color:#9aa3b2;cursor:pointer;font-size:20px;padding:4px 8px}
.sym-topbar button:hover{color:#fff}
.sym-body{display:grid;grid-template-columns:200px 1fr;overflow:hidden}
.sym-cats{border-right:1px solid #2e333d;overflow-y:auto;padding:8px 0}
.sym-cat-btn{width:100%;text-align:left;border:none;background:none;color:#9aa3b2;padding:8px 16px;cursor:pointer;font-size:12.5px;font-family:inherit;border-left:3px solid transparent;transition:.1s}
.sym-cat-btn:hover{background:#23272f;color:#e9ecf1}
.sym-cat-btn.active{color:#d9743b;background:#23272f;border-left-color:#d9743b}
.sym-cat-sep{height:1px;background:#2e333d;margin:6px 10px}
.sym-grid-wrap{overflow-y:auto;padding:16px}
.sym-group-hdr{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#5c6470;margin:10px 0 8px;font-weight:600}
.sym-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.sym-img-btn{width:60px;height:60px;border-radius:8px;border:2px solid transparent;background:#23272f;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;transition:.12s;position:relative}
.sym-img-btn:hover{border-color:#4a5060;background:#2c313b}
.sym-img-btn.selected{border-color:#d9743b;background:#3a2c1a}
.sym-img-btn img{max-width:100%;max-height:100%;object-fit:contain;image-rendering:pixelated}
.sym-img-btn .sym-name{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9px;white-space:nowrap;color:#6b7280;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.sym-load-hint{color:#5c6470;font-size:13px;text-align:center;padding:40px 20px;line-height:1.8}
.sym-load-hint button{background:var(--accent);border:none;color:#1a1308;border-radius:8px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;margin-top:14px;display:block;margin-left:auto;margin-right:auto}
.sym-active-preview{background:#23272f;border-radius:8px;padding:8px;display:flex;align-items:center;gap:10px;margin-right:8px;min-width:0;max-width:200px}
.sym-active-preview img{width:32px;height:32px;object-fit:contain;image-rendering:pixelated;flex:none}
.sym-active-preview span{font-size:11px;color:#9aa3b2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

@media(max-width:860px){.app{grid-template-columns:56px 1fr}.panel{display:none}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">GRUND<span>RISS</span></div>
    <div class="hint" id="hint"></div>
    <div class="readout">
      <span>L: <b id="ro-len">–</b></span>
      <span>&#8736; <b id="ro-ang">–</b></span>
      <span><b id="ro-pos">0.00, 0.00</b> m</span>
    </div>
  </div>

  <div class="tools" id="tools">
    <button class="tool active" data-tool="select" title="Auswählen / Verschieben / Drehen (V)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 3l7 18 2-7 7-2z" stroke-linejoin="round"/></svg><span class="kbd">V</span></button>
    <div class="tool-sep"></div>
    <button class="tool" data-tool="wall" title="Wand zeichnen (W)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 19L21 5"/><circle cx="3" cy="19" r="2"/><circle cx="21" cy="5" r="2"/></svg><span class="kbd">W</span></button>
    <button class="tool" data-tool="room" title="Raum / Rechteck (R)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="6" width="16" height="12" rx="1"/></svg><span class="kbd">R</span></button>
    <div class="tool-sep"></div>
    <button class="tool" data-tool="door" title="Tür platzieren (T)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M6 20V5l8-2v18"/><path d="M4 20h16"/><path d="M14 20a8 8 0 00-8-8" stroke-dasharray="2 2"/></svg><span class="kbd">T</span></button>
    <button class="tool" data-tool="window" title="Fenster platzieren (F)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12h16"/><path d="M4 9h16"/><path d="M4 9v6M20 9v6"/></svg><span class="kbd">F</span></button>
    <button class="tool" data-tool="garage" title="Garagentor platzieren (G)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="6" width="18" height="14" rx="1"/><path d="M3 10.5h18M3 14h18M3 17.5h18"/></svg><span class="kbd">G</span></button>
    <div class="tool-sep"></div>
    <button class="tool" data-tool="column" title="Säule platzieren (S)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="7" y="7" width="10" height="10" rx="1.5" fill="currentColor" stroke="none"/></svg><span class="kbd">S</span></button>
    <button class="tool" data-tool="object" title="Objekt (grau, X) platzieren (O)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="5" width="14" height="14" rx="1"/><path d="M5 5l14 14M19 5L5 19"/></svg><span class="kbd">O</span></button>
    <button class="tool" data-tool="stair" title="Treppe platzieren (P)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 20h4v-4h4v-4h4V8h4"/></svg><span class="kbd">P</span></button>
    <button class="tool" data-tool="elevator" title="Fahrstuhl platzieren (L)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="4" width="14" height="16" rx="1"/><path d="M5 4l14 16M19 4L5 20"/></svg><span class="kbd">L</span></button>
    <div class="tool-sep"></div>
    <button class="tool" data-tool="floor" title="Fußboden (B)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="4" width="16" height="16" rx="1" stroke-dasharray="3 2"/><path d="M8 4v16M14 4v16M4 9h16M4 15h16" opacity=".5"/></svg><span class="kbd">B</span></button>
    <div class="tool-sep"></div>
    <button class="tool" data-tool="text" title="Text platzieren (X)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg><span class="kbd">X</span></button>
    <button class="tool" data-tool="sprite" title="SR6-Symbol platzieren (I)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span class="kbd">I</span></button>
    <div class="tool-sep"></div>
    <button class="tool" data-tool="delete" title="Löschen (E)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 7h14M9 7V4h6v3M7 7l1 13h8l1-13"/></svg><span class="kbd">E</span></button>
  </div>

  <div class="stage" id="stage">
    <canvas id="c"></canvas>
    <div id="text-editor" style="display:none"><input id="text-editor-input" type="text" placeholder="Text…"></div>
    <div class="zoombar">
      <button id="zout">&minus;</button><div class="z" id="zlabel">100%</div>
      <button id="zin">+</button><button id="zfit" title="Einpassen">&#10530;</button>
    </div>
  </div>

  <div class="panel">
    <div class="sec">
      <h3>Ebenen</h3>
      <div id="level-list"></div>
      <div class="btn-row"><button class="btn" id="lvl-add">+ Ebene</button><button class="btn danger" id="lvl-del">Löschen</button></div>
      <div class="row" style="margin-top:9px"><label>Ebene darunter zeigen</label><div class="toggle on" id="t-underlay"></div></div>
    </div>

    <div class="sec">
      <h3>Auswahl</h3>
      <div id="sel-empty" class="empty-sel">Nichts ausgewählt.</div>
      <div id="sel-actions" style="display:none">
        <div class="btn-row" style="margin-bottom:7px">
          <button class="btn" id="do-copy">Kopieren&nbsp;<span style="opacity:.55;font-size:11px">Ctrl+C</span></button>
          <button class="btn" id="do-dupe">Duplizieren&nbsp;<span style="opacity:.55;font-size:11px">Ctrl+D</span></button>
        </div>
        <div id="copy-hint" style="font-size:11px;color:var(--accent);margin-bottom:8px;min-height:16px"></div>
      </div>
      <div id="sel-wall" style="display:none">
        <div class="selinfo">Wand &middot; Länge <b id="sw-len">–</b> m</div>
        <div class="row"><label>Dicke (m)</label><input type="number" id="sw-thick" step="0.02" min="0.05" max="1"></div>
        <button class="btn danger" id="sw-del">Wand löschen</button>
      </div>
      <div id="sel-open" style="display:none">
        <div class="miniseg" id="so-type"><button data-t="door">Tür</button><button data-t="window">Fenster</button><button data-t="garage">Tor</button></div>
        <div class="row"><label>Breite (m)</label><input type="number" id="so-width" step="0.05" min="0.3" max="6"></div>
        <button class="btn" id="so-flip">Tür spiegeln &#8635;</button>
        <button class="btn danger" id="so-del">Öffnung löschen</button>
      </div>
      <div id="sel-col" style="display:none">
        <div class="miniseg" id="sc-shape"><button data-s="square">Eckig</button><button data-s="round">Rund</button></div>
        <div class="row"><label>Breite (m)</label><input type="number" id="sc-w" step="0.05" min="0.1" max="3"></div>
        <div class="row"><label>Tiefe (m)</label><input type="number" id="sc-h" step="0.05" min="0.1" max="3"></div>
        <button class="btn danger" id="sc-del">Säule löschen</button>
      </div>
      <div id="sel-item" style="display:none">
        <div class="selinfo" id="si-kind">Objekt</div>
        <div class="miniseg" id="si-shape"><button data-s="square">Eckig</button><button data-s="round">Rund</button></div>
        <div class="row"><label id="si-wl">Breite (m)</label><input type="number" id="si-w" step="0.05" min="0.1" max="10"></div>
        <div class="row"><label id="si-hl">Tiefe (m)</label><input type="number" id="si-h" step="0.05" min="0.1" max="10"></div>
        <div class="row" id="si-stepsrow"><label>Stufen</label><input type="number" id="si-steps" step="1" min="2" max="40"></div>
        <div class="row" id="si-colorrow"><label>Farbe</label><input type="color" id="si-color"></div>
        <div class="row"><label>Drehung (°)</label><input type="number" id="si-rot" step="1"></div>
        <button class="btn danger" id="si-del">Objekt löschen</button>
      </div>

      <div id="sel-text" style="display:none">
        <div class="row"><label>Text</label><input type="text" id="st-text" style="flex:1;width:auto;font-family:inherit"></div>
        <div class="row"><label>Größe (m)</label><input type="number" id="st-size" step="0.05" min="0.05" max="5" value="0.3"></div>
        <div class="row"><label>Farbe</label><input type="color" id="st-color" value="#2a2a31"></div>
        <div class="row"><label>Fett</label><div class="toggle" id="t-bold"></div></div>
        <div class="row"><label>Drehung (°)</label><input type="number" id="st-rot" step="1"></div>
        <button class="btn danger" id="st-del">Text löschen</button>
      </div>
      <div id="sel-sprite" style="display:none">
        <div class="selinfo" id="ss-name">Symbol</div>
        <div style="text-align:center;margin-bottom:10px"><img id="ss-img" src="" style="max-width:80px;max-height:80px;image-rendering:pixelated;border-radius:6px;background:#23272f;padding:4px"></div>
        <div class="row"><label>Breite (m)</label><input type="number" id="ss-w" step="0.1" min="0.1" max="20"></div>
        <div class="row"><label>Höhe (m)</label><input type="number" id="ss-h" step="0.1" min="0.1" max="20"></div>
        <div class="row"><label>Drehung (°)</label><input type="number" id="ss-rot" step="1"></div>
        <button class="btn danger" id="ss-del">Symbol löschen</button>
      </div>
      <div id="sel-floor" style="display:none">
        <div class="selinfo">Fußboden &middot; <b id="sf-area">–</b> m²</div>
        <div class="row"><label>Breite (m)</label><input type="number" id="sf-w" step="0.1" min="0.2"></div>
        <div class="row"><label>Tiefe (m)</label><input type="number" id="sf-h" step="0.1" min="0.2"></div>
        <div class="row"><label>Farbe</label><input type="color" id="sf-color"></div>
        <button class="btn danger" id="sf-del">Fußboden löschen</button>
      </div>
    </div>

    <div class="sec">
      <h3>Standardwerte</h3>
      <div class="row"><label>Wanddicke</label><input type="number" id="def-thick" step="0.02" min="0.05" max="1" value="0.2"></div>
      <div class="row"><label>Türbreite</label><input type="number" id="def-door" step="0.05" min="0.4" max="3" value="0.9"></div>
      <div class="row"><label>Fensterbreite</label><input type="number" id="def-win" step="0.05" min="0.4" max="6" value="1.2"></div>
      <div class="row"><label>Torbreite</label><input type="number" id="def-garage" step="0.1" min="1.5" max="8" value="2.5"></div>
      <div class="row"><label>Säulengröße</label><input type="number" id="def-col" step="0.05" min="0.1" max="2" value="0.3"></div>
      <div class="row"><label>Objektgröße</label><input type="number" id="def-obj" step="0.05" min="0.1" max="3" value="0.6"></div>
      <div class="row"><label>Objektfarbe</label><input type="color" id="def-objcolor" value="#9a9aa1"></div>
      <div class="row"><label>Fußbodenfarbe</label><input type="color" id="def-floorcolor" value="#e9e2d2"></div>
    </div>

    <div class="sec">
      <h3>Raster &amp; Snapping</h3>
      <div class="row"><label>Raster (m)</label><input type="number" id="grid-size" step="0.1" min="0.1" max="5" value="0.5"></div>
      <div class="row"><label>Am Raster fangen</label><div class="toggle on" id="t-gridsnap"></div></div>
      <div class="row"><label>An Endpunkten fangen</label><div class="toggle on" id="t-snapend"></div></div>
      <div class="row"><label>Bemaßung anzeigen</label><div class="toggle on" id="t-dims"></div></div>
    </div>

    <div class="sec">
      <h3>PNG-Export <span style="font-weight:400;text-transform:none;letter-spacing:0">(aktive Ebene)</span></h3>
      <div class="row"><label>Auflösung (px/m)</label><input type="number" id="ex-res" step="10" min="20" max="400" value="120"></div>
      <div class="row"><label>Hintergrund</label><input type="color" id="ex-bg" value="#ffffff"></div>
      <div class="row"><label>Transparent</label><div class="toggle" id="t-transp"></div></div>
      <div class="row"><label>Raster im PNG</label><div class="toggle" id="t-exgrid"></div></div>
      <div class="row"><label>Bemaßung im PNG</label><div class="toggle on" id="t-exdims"></div></div>
      <button class="btn primary" id="export">PNG exportieren &#8675;</button>
    </div>

    <div class="sec">
      <h3>Projekt</h3>

<script>
"use strict";
//================= Datenmodell (Ebenen) =================
function makeLevel(name){return {name, walls:[], openings:[], columns:[], floors:[], items:[], sprites:[], texts:[]};}
let state = { active:0, levels:[ makeLevel("Erdgeschoss") ] };
const L = () => state.levels[state.active];
let nextId = 1; const newId = () => nextId++;

const settings = {
  defThick:0.2, defDoor:0.9, defWin:1.2, defGarage:2.5, defCol:0.3, defObj:0.6,
  defObjColor:"#9a9aa1", defFloorColor:"#e9e2d2",
  grid:0.5, gridSnap:true, snapEnd:true, dims:true, showUnderlay:true,
  exRes:120, exBg:"#ffffff", exTransp:false, exGrid:false, exDims:true
};

const cam = { x:4, y:3, scale:50 };
let tool="select", sel=null, hover=null, chain=null, rectStart=null, drag=null;
let mouseW={x:0,y:0}, snapInfo=null, shiftDown=false, spaceDown=false;
let clipboard=null, pasteCount=0;
const spriteCache=new Map(); // path -> {dataUrl, img}
let selectedSpritePath=null, selectedSpriteDataUrl=null;

const $ = s => document.querySelector(s);
const canvas=$("#c"), ctx=canvas.getContext("2d"), stage=$("#stage");
let dpr=1, cssW=0, cssH=0;

//================= Geometrie =================
const dist=(ax,ay,bx,by)=>Math.hypot(bx-ax,by-ay);
function wallLen(w){return dist(w.x1,w.y1,w.x2,w.y2);}
function unit(w){const Ln=wallLen(w)||1;return {x:(w.x2-w.x1)/Ln,y:(w.y2-w.y1)/Ln};}
function normal(w){const u=unit(w);return {x:-u.y,y:u.x};}
function getWall(id){return L().walls.find(w=>w.id===id);}
function defWidthFor(t){return t==="door"?settings.defDoor:t==="garage"?settings.defGarage:settings.defWin;}
function projToSeg(px,py,w){const dx=w.x2-w.x1,dy=w.y2-w.y1,L2=dx*dx+dy*dy;let t=L2?((px-w.x1)*dx+(py-w.y1)*dy)/L2:0;t=Math.max(0,Math.min(1,t));const x=w.x1+dx*t,y=w.y1+dy*t;return {t,x,y,dist:Math.hypot(px-x,py-y)};}

//================= Transform =================
function toScreen(wx,wy){return [(wx-cam.x)*cam.scale+cssW/2,(wy-cam.y)*cam.scale+cssH/2];}
function toWorld(sx,sy){return {x:(sx-cssW/2)/cam.scale+cam.x,y:(sy-cssH/2)/cam.scale+cam.y};}
const editorT={pt:(wx,wy)=>toScreen(wx,wy), m:(meters)=>meters*cam.scale};

//================= Snapping =================
function allEndpoints(){
  const pts=[]; for(const w of L().walls) pts.push({x:w.x1,y:w.y1},{x:w.x2,y:w.y2});
  if(settings.showUnderlay && state.active>0){const b=state.levels[state.active-1];for(const w of b.walls)pts.push({x:w.x1,y:w.y1},{x:w.x2,y:w.y2});}
  return pts;
}
function snap(wx,wy){
  let best={x:wx,y:wy,kind:"free"};
  if(settings.snapEnd){let bd=12/cam.scale;for(const p of allEndpoints()){const d=Math.hypot(p.x-wx,p.y-wy);if(d<bd){bd=d;best={x:p.x,y:p.y,kind:"end"};}}if(best.kind==="end")return best;}
  if(settings.gridSnap){const g=settings.grid;best={x:Math.round(wx/g)*g,y:Math.round(wy/g)*g,kind:"grid"};}
  return best;
}
function snapWithChainStart(wx,wy){if(chain&&chain.pts.length>1){const s=chain.pts[0];if(Math.hypot(s.x-wx,s.y-wy)<14/cam.scale)return {x:s.x,y:s.y,kind:"close"};}return snap(wx,wy);}
function applyAngleSnap(ax,ay,bx,by){const dx=bx-ax,dy=by-ay,Ln=Math.hypot(dx,dy);if(Ln<1e-6)return {x:bx,y:by};let a=Math.atan2(dy,dx);a=Math.round(a/(Math.PI/12))*(Math.PI/12);return {x:ax+Math.cos(a)*Ln,y:ay+Math.sin(a)*Ln};}

//================= Trefferprüfung =================
function hitWall(wx,wy,tolPx=8){const tol=tolPx/cam.scale;let best=null,bd=Infinity;for(const w of L().walls){const half=(w.thickness||settings.defThick)/2+tol;const p=projToSeg(wx,wy,w);if(p.dist<half&&p.dist<bd){bd=p.dist;best={kind:"wall",id:w.id,t:p.t,proj:{x:p.x,y:p.y}};}}return best;}
function hitOpening(wx,wy,tolPx=10){const tol=tolPx/cam.scale;let best=null,bd=Infinity;for(const o of L().openings){const w=getWall(o.wallId);if(!w)continue;const u=unit(w);const cx=w.x1+u.x*o.pos,cy=w.y1+u.y*o.pos;const d=Math.hypot(cx-wx,cy-wy);if(d<o.width/2+tol&&d<bd){bd=d;best={kind:"opening",id:o.id};}}return best;}
function hitEndpoint(wx,wy,tolPx=10){const tol=tolPx/cam.scale;let best=null,bd=tol;for(const w of L().walls){for(const e of[["1",w.x1,w.y1],["2",w.x2,w.y2]]){const d=Math.hypot(e[1]-wx,e[2]-wy);if(d<bd){bd=d;best={wallId:w.id,end:e[0]};}}}return best;}
function hitColumn(wx,wy,tolPx=4){const tol=tolPx/cam.scale;for(let i=L().columns.length-1;i>=0;i--){const col=L().columns[i];if(col.shape==="round"){const a=col.w/2+tol,b=col.h/2+tol;if((wx-col.x)*(wx-col.x)/(a*a)+(wy-col.y)*(wy-col.y)/(b*b)<=1)return {kind:"column",id:col.id};}else if(Math.abs(wx-col.x)<=col.w/2+tol&&Math.abs(wy-col.y)<=col.h/2+tol)return {kind:"column",id:col.id};}return null;}
function localOf(it,wx,wy){const c=Math.cos(it.rot||0),s=Math.sin(it.rot||0);const dx=wx-it.x,dy=wy-it.y;return {x:dx*c+dy*s, y:-dx*s+dy*c};}
function hitItem(wx,wy,tolPx=4){const tol=tolPx/cam.scale;for(let i=L().items.length-1;i>=0;i--){const it=L().items[i];const lp=localOf(it,wx,wy);if(it.type==="object"&&it.shape==="round"){const a=it.w/2+tol,b=it.h/2+tol;if(lp.x*lp.x/(a*a)+lp.y*lp.y/(b*b)<=1)return {kind:"item",id:it.id};}else if(Math.abs(lp.x)<=it.w/2+tol&&Math.abs(lp.y)<=it.h/2+tol)return {kind:"item",id:it.id};}return null;}
function hitFloor(wx,wy){for(let i=L().floors.length-1;i>=0;i--){const f=L().floors[i];if(Math.abs(wx-f.x)<=f.w/2&&Math.abs(wy-f.y)<=f.h/2)return {kind:"floor",id:f.id};}return null;}
function itemHandleScreen(it){const p=toScreen(it.x,it.y);const hp=it.h*cam.scale;const hy=-hp/2-3-24;const c=Math.cos(it.rot||0),s=Math.sin(it.rot||0);return [p[0]-hy*s,p[1]+hy*c];}

//================= Rendering =================
function resize(){dpr=window.devicePixelRatio||1;cssW=stage.clientWidth;cssH=stage.clientHeight;canvas.width=Math.round(cssW*dpr);canvas.height=Math.round(cssH*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);render();}

function drawGrid(c,T,b){const g=settings.grid;const x0=Math.floor(b.minx/g)*g,x1=Math.ceil(b.maxx/g)*g,y0=Math.floor(b.miny/g)*g,y1=Math.ceil(b.maxy/g)*g;c.lineWidth=1;
  for(let x=x0;x<=x1+1e-6;x+=g){c.strokeStyle=Math.abs(Math.round(x/g)%5)<1e-6?"rgba(47,111,143,.34)":"rgba(47,111,143,.16)";const a=T.pt(x,b.miny),bb=T.pt(x,b.maxy);c.beginPath();c.moveTo(a[0],a[1]);c.lineTo(bb[0],bb[1]);c.stroke();}
  for(let y=y0;y<=y1+1e-6;y+=g){c.strokeStyle=Math.abs(Math.round(y/g)%5)<1e-6?"rgba(47,111,143,.34)":"rgba(47,111,143,.16)";const a=T.pt(b.minx,y),bb=T.pt(b.maxx,y);c.beginPath();c.moveTo(a[0],a[1]);c.lineTo(bb[0],bb[1]);c.stroke();}}

function drawWalls(c,T,lv,color){c.strokeStyle=color;c.lineCap="square";c.lineJoin="miter";for(const w of lv.walls){c.lineWidth=T.m(Math.max(0.02,w.thickness||settings.defThick));const a=T.pt(w.x1,w.y1),b=T.pt(w.x2,w.y2);c.beginPath();c.moveTo(a[0],a[1]);c.lineTo(b[0],b[1]);c.stroke();}}
function eraseOpenings(c,T,lv){c.save();c.globalCompositeOperation="destination-out";c.fillStyle="#000";for(const o of lv.openings){const w=lv.walls.find(x=>x.id===o.wallId);if(!w)continue;const u=unit(w),n=normal(w),th=Math.max(0.02,w.thickness||settings.defThick)*1.4,Ln=wallLen(w),pos=Math.max(o.width/2,Math.min(Ln-o.width/2,o.pos)),cx=w.x1+u.x*pos,cy=w.y1+u.y*pos,hw=o.width/2;const p=[T.pt(cx-u.x*hw-n.x*th/2,cy-u.y*hw-n.y*th/2),T.pt(cx+u.x*hw-n.x*th/2,cy+u.y*hw-n.y*th/2),T.pt(cx+u.x*hw+n.x*th/2,cy+u.y*hw+n.y*th/2),T.pt(cx-u.x*hw+n.x*th/2,cy-u.y*hw+n.y*th/2)];c.beginPath();c.moveTo(p[0][0],p[0][1]);for(let i=1;i<4;i++)c.lineTo(p[i][0],p[i][1]);c.closePath();c.fill();}c.restore();}
function drawOpeningSymbols(c,T,lv,color){for(const o of lv.openings){const w=lv.walls.find(x=>x.id===o.wallId);if(!w)continue;const u=unit(w),n=normal(w),th=Math.max(0.02,w.thickness||settings.defThick),Ln=wallLen(w),pos=Math.max(o.width/2,Math.min(Ln-o.width/2,o.pos)),cx=w.x1+u.x*pos,cy=w.y1+u.y*pos,hw=o.width/2;const aC={x:cx-u.x*hw,y:cy-u.y*hw},bC={x:cx+u.x*hw,y:cy+u.y*hw};c.strokeStyle=color;c.lineCap="butt";c.lineJoin="miter";c.lineWidth=Math.max(1,T.m(th)*0.18);for(const e of[aC,bC]){const s1=T.pt(e.x-n.x*th/2,e.y-n.y*th/2),s2=T.pt(e.x+n.x*th/2,e.y+n.y*th/2);c.beginPath();c.moveTo(s1[0],s1[1]);c.lineTo(s2[0],s2[1]);c.stroke();}
  if(o.type==="window"){c.lineWidth=Math.max(1,T.m(0.03));for(const off of[-0.18,0.18]){const s1=T.pt(aC.x+n.x*th*off,aC.y+n.y*th*off),s2=T.pt(bC.x+n.x*th*off,bC.y+n.y*th*off);c.beginPath();c.moveTo(s1[0],s1[1]);c.lineTo(s2[0],s2[1]);c.stroke();}}
  else if(o.type==="garage"){c.lineWidth=Math.max(1,T.m(0.05));const a1=T.pt(aC.x,aC.y),b1=T.pt(bC.x,bC.y);c.beginPath();c.moveTo(a1[0],a1[1]);c.lineTo(b1[0],b1[1]);c.stroke();const panels=Math.max(2,Math.round(o.width/0.6));c.lineWidth=Math.max(1,T.m(0.025));for(let i=1;i<panels;i++){const f=i/panels,px=aC.x+(bC.x-aC.x)*f,py=aC.y+(bC.y-aC.y)*f,s1=T.pt(px-n.x*th*0.42,py-n.y*th*0.42),s2=T.pt(px+n.x*th*0.42,py+n.y*th*0.42);c.beginPath();c.moveTo(s1[0],s1[1]);c.lineTo(s2[0],s2[1]);c.stroke();}}
  else {const sw=o.swing||1,H=aC,leafEnd={x:H.x+n.x*sw*o.width,y:H.y+n.y*sw*o.width},closed={x:H.x+u.x*o.width,y:H.y+u.y*o.width};c.lineWidth=Math.max(1,T.m(0.04));const hs=T.pt(H.x,H.y),le=T.pt(leafEnd.x,leafEnd.y);c.beginPath();c.moveTo(hs[0],hs[1]);c.lineTo(le[0],le[1]);c.stroke();const a0=Math.atan2(T.pt(closed.x,closed.y)[1]-hs[1],T.pt(closed.x,closed.y)[0]-hs[0]),a1=Math.atan2(le[1]-hs[1],le[0]-hs[0]),r=Math.hypot(le[0]-hs[0],le[1]-hs[1]);c.lineWidth=Math.max(1,T.m(0.02));c.setLineDash([T.m(0.06),T.m(0.06)]);let diff=a1-a0;while(diff>Math.PI)diff-=2*Math.PI;while(diff<-Math.PI)diff+=2*Math.PI;c.beginPath();c.arc(hs[0],hs[1],r,a0,a1,diff<0);c.stroke();c.setLineDash([]);}}}
function drawColumns(c,T,lv,color){c.fillStyle=color;for(const col of lv.columns){if(col.shape==="round"){const p=T.pt(col.x,col.y);c.beginPath();c.ellipse(p[0],p[1],T.m(col.w/2),T.m(col.h/2),0,0,7);c.fill();}else{const w=col.w,h=col.h,pts=[T.pt(col.x-w/2,col.y-h/2),T.pt(col.x+w/2,col.y-h/2),T.pt(col.x+w/2,col.y+h/2),T.pt(col.x-w/2,col.y+h/2)];c.beginPath();c.moveTo(pts[0][0],pts[0][1]);for(let i=1;i<4;i++)c.lineTo(pts[i][0],pts[i][1]);c.closePath();c.fill();}}}

function drawItem(c,T,it,ghost){
  const p=T.pt(it.x,it.y),wp=T.m(it.w),hp=T.m(it.h);
  c.save();c.translate(p[0],p[1]);c.rotate(it.rot||0);
  if(ghost){c.strokeStyle="#5b6270";c.lineWidth=1.5;if(it.type==="object"&&it.shape==="round"){c.beginPath();c.ellipse(0,0,wp/2,hp/2,0,0,7);c.stroke();}else c.strokeRect(-wp/2,-hp/2,wp,hp);c.restore();return;}
  if(it.type==="object"){
    const oc=it.color||"#9a9aa1";
    if(it.shape==="round"){c.fillStyle=oc;c.beginPath();c.ellipse(0,0,wp/2,hp/2,0,0,7);c.fill();c.save();c.beginPath();c.ellipse(0,0,wp/2,hp/2,0,0,7);c.clip();c.strokeStyle="#141414";c.lineWidth=Math.max(1,T.m(0.03));c.beginPath();c.moveTo(-wp/2,-hp/2);c.lineTo(wp/2,hp/2);c.moveTo(wp/2,-hp/2);c.lineTo(-wp/2,hp/2);c.stroke();c.restore();}
    else{c.fillStyle=oc;c.fillRect(-wp/2,-hp/2,wp,hp);c.strokeStyle="#141414";c.lineWidth=Math.max(1,T.m(0.03));c.beginPath();c.moveTo(-wp/2,-hp/2);c.lineTo(wp/2,hp/2);c.moveTo(wp/2,-hp/2);c.lineTo(-wp/2,hp/2);c.stroke();}
  } else if(it.type==="elevator"){
    c.fillStyle="#cdced4";c.fillRect(-wp/2,-hp/2,wp,hp);c.strokeStyle="#2a2a31";c.lineWidth=Math.max(1.2,T.m(0.04));c.strokeRect(-wp/2,-hp/2,wp,hp);c.beginPath();c.moveTo(-wp/2,-hp/2);c.lineTo(wp/2,hp/2);c.moveTo(wp/2,-hp/2);c.lineTo(-wp/2,hp/2);c.stroke();c.lineWidth=Math.max(1.4,T.m(0.06));c.beginPath();c.moveTo(-wp*0.25,hp/2);c.lineTo(wp*0.25,hp/2);c.stroke();
  } else if(it.type==="stair"){
    c.strokeStyle="#2a2a31";c.lineWidth=Math.max(1,T.m(0.025));c.strokeRect(-wp/2,-hp/2,wp,hp);const steps=Math.max(2,it.steps||14);for(let i=1;i<steps;i++){const x=-wp/2+wp*(i/steps);c.beginPath();c.moveTo(x,-hp/2);c.lineTo(x,hp/2);c.stroke();}c.lineWidth=Math.max(1.2,T.m(0.03));c.beginPath();c.moveTo(-wp/2+wp*0.1,0);c.lineTo(wp/2-wp*0.14,0);c.stroke();const ax=wp/2-wp*0.14,ah=Math.min(hp*0.2,T.m(0.13)),al=T.m(0.13);c.beginPath();c.moveTo(ax,0);c.lineTo(ax-al,-ah);c.moveTo(ax,0);c.lineTo(ax-al,ah);c.stroke();
  }
  c.restore();
}
function drawItems(c,T,lv,ghost){for(const it of lv.items)drawItem(c,T,it,ghost);}

function drawDims(c,T,lv){c.font="600 12px 'IBM Plex Mono', monospace";c.textAlign="center";c.textBaseline="middle";for(const w of lv.walls){const Ln=wallLen(w);if(Ln<0.05)continue;const u=unit(w),n=normal(w),th=(w.thickness||settings.defThick),off=th/2+0.22,mx=(w.x1+w.x2)/2+n.x*off,my=(w.y1+w.y2)/2+n.y*off,p=T.pt(mx,my);let ang=Math.atan2(u.y,u.x);if(ang>Math.PI/2)ang-=Math.PI;if(ang<-Math.PI/2)ang+=Math.PI;const label=Ln.toFixed(2)+" m";c.save();c.translate(p[0],p[1]);c.rotate(ang);const tw=c.measureText(label).width;c.fillStyle="rgba(243,239,230,.92)";c.fillRect(-tw/2-4,-9,tw+8,18);c.fillStyle="#2f6f8f";c.fillText(label,0,0);c.restore();}}

// Geometrie einer Ebene (Tinte oder Geist)
function renderLevel(c,T,lv,ghost){
  if(ghost){drawFloors(c,T,lv,settings.defFloorColor,true,"rgba(120,95,60,.55)");drawWalls(c,T,lv,"#5b6270");drawColumns(c,T,lv,"#6b7280");drawItems(c,T,lv,true);drawSprites(c,T,lv,true);drawTexts(c,T,lv,true);return;}
  drawWalls(c,T,lv,"#2a2a31");
  eraseOpenings(c,T,lv);
  drawOpeningSymbols(c,T,lv,"#2a2a31");
  drawColumns(c,T,lv,"#2a2a31");
  drawItems(c,T,lv,false);
  drawSprites(c,T,lv,false);
  drawTexts(c,T,lv,false);
}
// Fußböden: füllt mit gegebener Farbe (deckt Unterlage ab) + optional Markierung
function drawFloors(c,T,lv,fallbackFill,hint,hintColor){for(const f of lv.floors){const p=[T.pt(f.x-f.w/2,f.y-f.h/2),T.pt(f.x+f.w/2,f.y-f.h/2),T.pt(f.x+f.w/2,f.y+f.h/2),T.pt(f.x-f.w/2,f.y+f.h/2)];c.beginPath();c.moveTo(p[0][0],p[0][1]);for(let i=1;i<4;i++)c.lineTo(p[i][0],p[i][1]);c.closePath();const fill=f.color||fallbackFill;if(fill){c.fillStyle=fill;c.fill();}if(hint){c.setLineDash([6,5]);c.strokeStyle=hintColor||"rgba(185,138,94,.75)";c.lineWidth=1.3;c.stroke();c.setLineDash([]);}}}

function sceneBoundsScreen(){const tl=toWorld(0,0),br=toWorld(cssW,cssH);return {minx:tl.x,miny:tl.y,maxx:br.x,maxy:br.y};}

function render(){
  ctx.clearRect(0,0,cssW,cssH);
  const b=sceneBoundsScreen();
  drawGrid(ctx,editorT,b);
  // Unterlagen: alle Ebenen darunter, von ganz unten nach oben, mit abnehmender Sichtbarkeit
  if(settings.showUnderlay && state.active>0){
    for(let i=0;i<state.active;i++){
      const depth=state.active-i;                       // 1 = direkt darunter
      const alpha=Math.max(0.05, 0.32*Math.pow(0.62,depth-1));
      ctx.save();ctx.globalAlpha=alpha;renderLevel(ctx,editorT,state.levels[i],true);ctx.restore();
    }
  }
  // Aktive Fußböden: decken die Unterlage ab UND werden sichtbar markiert (auch im EG)
  drawFloors(ctx,editorT,L(),settings.defFloorColor,true);
  renderLevel(ctx,editorT,L(),false);
  if(settings.dims) drawDims(ctx,editorT,L());
  ctx.save();ctx.globalCompositeOperation="destination-over";ctx.fillStyle="#f3efe6";ctx.fillRect(0,0,cssW,cssH);ctx.restore();

  // ----- Overlays -----
  if(hover && (tool==="door"||tool==="window"||tool==="garage") && hover.kind==="wall") highlightWall(hover.id,"rgba(217,116,59,.35)");
  if(sel){
    if(sel.kind==="wall"){highlightWall(sel.id,"rgba(217,116,59,.85)");drawWallEndpoints(sel.id);}
    if(sel.kind==="opening") highlightOpening(sel.id);
    if(sel.kind==="column") highlightColumn(sel.id);
    if(sel.kind==="item") highlightItem(sel.id);
    if(sel.kind==="floor") highlightFloor(sel.id);
    if(sel.kind==="sprite") highlightSprite(sel.id);
    if(sel.kind==="text") highlightText(sel.id);
  }

function copySelected(){
  if(!sel) return;

  else if(sel.kind==="opening"){const o=L().openings.find(x=>x.id===sel.id);if(!o)return;clipboard={kind:"opening",data:{...o}};}
  else if(sel.kind==="column"){const c=L().columns.find(x=>x.id===sel.id);if(!c)return;clipboard={kind:"column",data:{...c}};}
  else if(sel.kind==="item"){const it=L().items.find(x=>x.id===sel.id);if(!it)return;clipboard={kind:"item",data:{...it}};}
  else if(sel.kind==="floor"){const f=L().floors.find(x=>x.id===sel.id);if(!f)return;clipboard={kind:"floor",data:{...f}};}
  else if(sel.kind==="text"){const t=L().texts.find(x=>x.id===sel.id);if(!t){sel=null;return refreshPanel();}$("#sel-text").style.display="block";$("#st-text").value=t.text||"";$("#st-size").value=t.size||0.3;$("#st-color").value=t.color||"#2a2a31";$("#st-rot").value=Math.round((t.rot||0)*180/Math.PI);document.getElementById("t-bold").classList.toggle("on",!!t.bold);}

function pasteClipboard(){
  if(!clipboard) return;
  snapshot(); pasteCount++;
  const off=settings.grid*pasteCount;
  const d=clipboard.data;
  let newId_=newId(), newSel=null;
  if(clipboard.kind==="wall"){
    const w={...d,id:newId_,x1:d.x1+off,y1:d.y1+off,x2:d.x2+off,y2:d.y2+off};
    L().walls.push(w); newSel={kind:"wall",id:w.id};
  } else if(clipboard.kind==="opening"){
    const w=L().walls.find(x=>x.id===d.wallId);
    if(!w){alert("Die Ursprungswand existiert nicht mehr.");return;}
    const Ln=wallLen(w), newPos=Math.max(d.width/2,Math.min(Ln-d.width/2, d.pos+(d.width+0.05)*pasteCount));
    const o={...d,id:newId_,pos:newPos}; L().openings.push(o); newSel={kind:"opening",id:o.id};
  } else if(clipboard.kind==="column"){
    const c={...d,id:newId_,x:d.x+off,y:d.y+off}; L().columns.push(c); newSel={kind:"column",id:c.id};
  } else if(clipboard.kind==="item"){
    const it={...d,id:newId_,x:d.x+off,y:d.y+off}; L().items.push(it); newSel={kind:"item",id:it.id};
  } else if(clipboard.kind==="text"){
    const t={...d,id:newId_,x:d.x+off,y:d.y+off};L().texts.push(t);newSel={kind:"text",id:t.id};
  } else if(clipboard.kind==="sprite"){
    const sp={...d,id:newId_,x:d.x+off,y:d.y+off};L().sprites.push(sp);newSel={kind:"sprite",id:sp.id};
  } else if(clipboard.kind==="floor"){
    const f={...d,id:newId_,x:d.x+off,y:d.y+off}; L().floors.push(f); newSel={kind:"floor",id:f.id};
  }

}

function drawSprites(c,T,lv,ghost){
  for(const sp of lv.sprites){
    const p=T.pt(sp.x,sp.y),wp=T.m(sp.w),hp=T.m(sp.h);
    c.save();c.translate(p[0],p[1]);c.rotate(sp.rot||0);
    if(ghost){c.globalAlpha*=0.7;}
    const cached=spriteCache.get(sp.path);
    if(cached&&cached.img&&cached.img.complete&&cached.img.naturalWidth>0){
      c.drawImage(cached.img,-wp/2,-hp/2,wp,hp);
    } else {
      c.strokeStyle="#888";c.setLineDash([4,3]);c.lineWidth=1;c.strokeRect(-wp/2,-hp/2,wp,hp);c.setLineDash([]);
      c.fillStyle="#777";c.font=`${Math.max(8,Math.min(14,hp*0.5))}px sans-serif`;c.textAlign="center";c.textBaseline="middle";c.fillText("?",0,0);
    }
    c.restore();
  }
}
function hitSprite(wx,wy,tolPx=4){
  const tol=tolPx/cam.scale;
  for(let i=L().sprites.length-1;i>=0;i--){
    const sp=L().sprites[i];const lp=localOf(sp,wx,wy);
    if(Math.abs(lp.x)<=sp.w/2+tol&&Math.abs(lp.y)<=sp.h/2+tol)return {kind:"sprite",id:sp.id};
  }return null;
}
function highlightSprite(id){

  const p=toScreen(sp.x,sp.y),wp=sp.w*cam.scale,hp=sp.h*cam.scale;

  ctx.strokeStyle="#d9743b";ctx.lineWidth=2;ctx.strokeRect(-wp/2-3,-hp/2-3,wp+6,hp+6);

}

window.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT")return;
  if(e.key==="Shift")shiftDown=true;
  if(e.code==="Space"){spaceDown=true;stage.classList.add("panning");e.preventDefault();}
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){e.preventDefault();e.shiftKey?redo():undo();return;}
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="y"){e.preventDefault();redo();return;}
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="c"){e.preventDefault();copySelected();return;}
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="v"){e.preventDefault();pasteClipboard();return;}
  if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="d"){e.preventDefault();copySelected();pasteClipboard();return;}
  const k=e.key.toLowerCase();
  if(k==="v")setTool("select");else if(k==="w")setTool("wall");else if(k==="r")setTool("room");
  else if(k==="t")setTool("door");else if(k==="f")setTool("window");else if(k==="g")setTool("garage");
  else if(k==="s")setTool("column");else if(k==="o")setTool("object");else if(k==="p")setTool("stair");
  else if(k==="l")setTool("elevator");else if(k==="b")setTool("floor");else if(k==="x")setTool("text");else if(k==="i"){setTool("sprite");document.getElementById("sym-overlay").classList.add("open");}else if(k==="e")setTool("delete");
  else if(e.key==="Escape"){chain=null;rectStart=null;sel=null;snapInfo=null;refresh();}
  else if(e.key==="Enter"){if(tool==="wall"&&chain)commitChain(false);}
  else if(e.key==="Delete"||e.key==="Backspace"){if(sel){snapshot();if(sel.kind==="wall")deleteWall(sel.id);else if(sel.kind==="opening")L().openings=L().openings.filter(o=>o.id!==sel.id);else if(sel.kind==="column")L().columns=L().columns.filter(c=>c.id!==sel.id);else if(sel.kind==="item")L().items=L().items.filter(x=>x.id!==sel.id);else if(sel.kind==="floor")L().floors=L().floors.filter(f=>f.id!==sel.id);sel=null;refresh();}}
});

function geoBounds(pad=1,lvs){
  lvs=lvs||[L()];
  let minx=Infinity,miny=Infinity,maxx=-Infinity,maxy=-Infinity,mt=0,any=false;
  for(const lv of lvs){
    for(const w of lv.walls){minx=Math.min(minx,w.x1,w.x2);maxx=Math.max(maxx,w.x1,w.x2);miny=Math.min(miny,w.y1,w.y2);maxy=Math.max(maxy,w.y1,w.y2);mt=Math.max(mt,w.thickness||settings.defThick);any=true;}
    for(const arr of[lv.columns,lv.items,lv.floors,...[lv.sprites||[]],...[lv.texts||[]]]){for(const o of arr){const hw=(o.w||0.3)/2+(Math.abs(o.rot||0)>0?(o.h||0.3)/2:0),hh=(o.h||0.3)/2+(Math.abs(o.rot||0)>0?(o.w||0.3)/2:0);minx=Math.min(minx,o.x-hw);maxx=Math.max(maxx,o.x+hw);miny=Math.min(miny,o.y-hh);maxy=Math.max(maxy,o.y+hh);any=true;}}
  }
  if(!any)return null;const p=pad+mt/2;return {minx:minx-p,miny:miny-p,maxx:maxx+p,maxy:maxy+p};
}
function fitView(){const b=geoBounds(1);if(!b)return;const w=b.maxx-b.minx,h=b.maxy-b.miny;cam.scale=Math.max(8,Math.min(400,Math.min(cssW/w,cssH/h)*0.9));cam.x=(b.minx+b.maxx)/2;cam.y=(b.miny+b.maxy)/2;updateZoomLabel();render();}

//================= PNG-Export =================
$("#export").addEventListener("click",()=>{
  const visLevels=state.levels.slice(0,state.active+1);
  const b=geoBounds(0.8,visLevels)||{minx:0,miny:0,maxx:5,maxy:4};
  const extra=settings.exDims?0.5:0.1;b.minx-=extra;b.miny-=extra;b.maxx+=extra;b.maxy+=extra;
  const res=settings.exRes,W=Math.max(1,Math.round((b.maxx-b.minx)*res)),H=Math.max(1,Math.round((b.maxy-b.miny)*res));
  const ex=document.createElement("canvas");ex.width=W;ex.height=H;
  const ec=ex.getContext("2d"),T={pt:(wx,wy)=>[(wx-b.minx)*res,(wy-b.miny)*res],m:(meters)=>meters*res};
  if(settings.exGrid)drawGrid(ec,T,b);
  // Unterlagen mit gleicher Transparenzstaffelung wie im Editor
  if(settings.showUnderlay&&state.active>0){
    for(let i=0;i<state.active;i++){
      const depth=state.active-i,alpha=Math.max(0.05,0.32*Math.pow(0.62,depth-1));
      ec.save();ec.globalAlpha=alpha;renderLevel(ec,T,state.levels[i],true);ec.restore();
    }
  }
  // Aktive Fußböden (deckt Unterlage ab)
  drawFloors(ec,T,L(),settings.defFloorColor,false);
  // Aktive Ebene
  renderLevel(ec,T,L(),false);
  if(settings.exDims)drawDims(ec,T,L());
  ec.save();ec.globalCompositeOperation="destination-over";if(!settings.exTransp){ec.fillStyle=settings.exBg;ec.fillRect(0,0,W,H);}ec.restore();
  ex.toBlob(blob=>{const url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="grundriss_"+L().name.replace(/\s+/g,"_")+".png";a.click();URL.revokeObjectURL(url);},"image/png");
});

$("#save").addEventListener("click",()=>{const data=JSON.stringify({state,settings,version:2},null,1),blob=new Blob([data],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="grundriss.json";a.click();URL.revokeObjectURL(url);});
$("#load").addEventListener("click",()=>$("#fileinput").click());
$("#fileinput").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.state)throw 0;snapshot();let s=d.state;if(!s.levels){s={active:0,levels:[Object.assign(makeLevel("Erdgeschoss"),{walls:s.walls||[],openings:s.openings||[],columns:s.columns||[]})]};}for(const lv of s.levels){lv.walls=lv.walls||[];lv.openings=lv.openings||[];lv.columns=lv.columns||[];lv.floors=lv.floors||[];lv.items=lv.items||[];lv.sprites=lv.sprites||[];lv.sprites=lv.sprites||[];lv.texts=lv.texts||[];}if(typeof s.active!=="number"||s.active>=s.levels.length)s.active=0;state=s;if(d.settings)Object.assign(settings,d.settings);let mx=0;for(const lv of state.levels)for(const arr of[lv.walls,lv.openings,lv.columns,lv.floors,lv.items])for(const o of arr)mx=Math.max(mx,o.id||0);nextId=mx+1;sel=null;syncInputs();renderLevels();fitView();refresh();}catch(err){alert("Datei konnte nicht gelesen werden.");}};r.readAsText(f);e.target.value="";});
function syncInputs(){$("#def-thick").value=settings.defThick;$("#def-door").value=settings.defDoor;$("#def-win").value=settings.defWin;$("#def-garage").value=settings.defGarage;$("#def-col").value=settings.defCol;$("#def-obj").value=settings.defObj;$("#def-objcolor").value=settings.defObjColor;$("#def-floorcolor").value=settings.defFloorColor;$("#grid-size").value=settings.grid;$("#ex-res").value=settings.exRes;$("#ex-bg").value=settings.exBg;["#t-gridsnap","gridSnap","#t-snapend","snapEnd","#t-dims","dims","#t-underlay","showUnderlay","#t-transp","exTransp","#t-exgrid","exGrid","#t-exdims","exDims"].forEach((v,i,a)=>{if(i%2===0)$(v).classList.toggle("on",settings[a[i+1]]);});}



// ── Text elements ──────────────────────────────────────────────────────────
function drawTexts(c,T,lv,ghost){
  for(const t of lv.texts){
    if(!t.text)continue;
    const p=T.pt(t.x,t.y),fs=Math.max(7,T.m(t.size||0.3));
    c.save();c.translate(p[0],p[1]);c.rotate(t.rot||0);
    if(ghost)c.globalAlpha*=0.55;
    c.fillStyle=ghost?"#5b6270":(t.color||"#2a2a31");
    c.font=`${t.bold?"bold ":""}${fs}px 'IBM Plex Sans',sans-serif`;
    c.textAlign="left";c.textBaseline="alphabetic";
    c.fillText(t.text,0,0);
    c.restore();
  }
}
function textBounds(t){
  // rough local bounding box (x0,y0,x1,y1) in world metres relative to t.x,t.y
  const chars=t.text?t.text.length:1,s=t.size||0.3;
  return {x0:0,y0:-s*0.9,x1:chars*s*0.58,y1:s*0.3};
}
function hitText(wx,wy,tolPx=6){
  const tol=tolPx/cam.scale;
  for(let i=L().texts.length-1;i>=0;i--){
    const t=L().texts[i];const lp=localOf(t,wx,wy);
    const b=textBounds(t);
    if(lp.x>=b.x0-tol&&lp.x<=b.x1+tol&&lp.y>=b.y0-tol&&lp.y<=b.y1+tol)
      return {kind:"text",id:t.id};
  }return null;
}
function textHandleScreen(t){
  const b=textBounds(t),p=toScreen(t.x,t.y);
  const hy=-(b.y1-b.y0)*cam.scale/2-3-24;
  const c=Math.cos(t.rot||0),s=Math.sin(t.rot||0);
  const mx=(b.x0+b.x1)/2*cam.scale;
  return [p[0]+mx*c-hy*s, p[1]+mx*s+hy*c];
}
function highlightText(id){
  const t=L().texts.find(x=>x.id===id);if(!t)return;
  const b=textBounds(t),p=toScreen(t.x,t.y);
  const wp=(b.x1-b.x0)*cam.scale,hp=(b.y1-b.y0)*cam.scale;
  const ox=b.x0*cam.scale,oy=b.y0*cam.scale;
  ctx.save();ctx.translate(p[0],p[1]);ctx.rotate(t.rot||0);
  ctx.strokeStyle="#d9743b";ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
  ctx.strokeRect(ox-3,oy-3,wp+6,hp+6);ctx.setLineDash([]);
  const mx=ox+wp/2,hy=oy-3-24;
  ctx.beginPath();ctx.moveTo(mx,oy-3);ctx.lineTo(mx,hy);ctx.stroke();
  ctx.beginPath();ctx.arc(mx,hy,6,0,7);ctx.fillStyle="#fff";ctx.fill();
  ctx.strokeStyle="#d9743b";ctx.lineWidth=1.5;ctx.stroke();
  ctx.restore();
}

// inline text editor state
let editingTextId=null;
function showTextEditor(screenX,screenY,rot,initialVal,onCommit){
  const ed=document.getElementById("text-editor");
  const inp=document.getElementById("text-editor-input");
  ed.style.display="block";
  ed.style.left=screenX+"px";ed.style.top=screenY+"px";
  ed.style.transform=`rotate(${rot||0}rad)`;
  inp.value=initialVal||"";inp.style.fontSize="16px";
  inp.style.width="auto";
  setTimeout(()=>{inp.focus();inp.select();},10);
  inp._commit=onCommit;
}
function hideTextEditor(){
  document.getElementById("text-editor").style.display="none";
  editingTextId=null;
}
document.getElementById("text-editor-input").addEventListener("keydown",e=>{
  if(e.key==="Enter"){e.preventDefault();commitTextEditor();}
  if(e.key==="Escape"){hideTextEditor();}
  // auto-resize
  e.target.style.width=Math.max(80,e.target.value.length*10)+"px";
});
document.getElementById("text-editor-input").addEventListener("blur",()=>{
  // small delay to distinguish blur from Enter
  setTimeout(commitTextEditor,120);
});
function commitTextEditor(){
  const inp=document.getElementById("text-editor-input");
  if(inp._commit){inp._commit(inp.value.trim());inp._commit=null;}
  hideTextEditor();
}

// ============ SR6 Symbol Browser ============
const CATNAMES={
  "kamera":"Kamera","kamera/sichtbar":"Kamera · sichtbar","kamera/verborgen":"Kamera · verborgen",
  "kamera/Sichtbereich":"Kamera · Sichtbereich","magische_barriere":"Mag. Barriere",
  "magische_barriere/biofaser":"Barriere · Biofaser","magische_barriere/hueter":"Barriere · Hüter",
  "magschloss_biometrisch":"Magschloss biom.","magschloss_dna":"Magschloss DNA",
  "magschloss_kartenleser":"Magschloss Karte","magschloss_rfid":"Magschloss RFID",
  "magschloss_tastatur":"Magschloss Tastatur","nichtspielercharaktere":"NSC",
  "nummerierung":"Nummerierung","nummerierung/links":"Nr. links","nummerierung/oben":"Nr. oben",
  "nummerierung/rechts":"Nr. rechts","nummerierung/unten":"Nr. unten","scanner":"Scanner",
  "schloss":"Schloss","schloss_transponderschluessel":"Schloss Transponder",
  "sonstiges":"Sonstiges","verborgenes_system":"Verborgenes System"
};
let symTree={}, activeCat=null;

function catKey(path){
  const parts=path.split("/");
  if(parts.length<2)return null;
  const top=parts[0];
  // Group magschloss sub-variants under top-level parent
  if(top==="magschloss_biometrisch") return "magschloss_biometrisch";
  if(top==="scanner") return "scanner";
  if(top==="nummerierung") return parts.slice(0,2).join("/");
  if(top==="kamera") return parts.length>2?parts.slice(0,2).join("/"):top;
  if(top==="magische_barriere") return parts.length>2?parts.slice(0,2).join("/"):top;
  return top;
}

function loadSymbolZip(file){
  const reader=new FileReader();
  reader.onload=async(ev)=>{
    try{
      const zip=await JSZip.loadAsync(ev.target.result);
      symTree={};
      const jobs=[];
      zip.forEach((relPath,entry)=>{
        if(!relPath.toLowerCase().endsWith(".png"))return;
        const cat=catKey(relPath);if(!cat)return;
        if(!symTree[cat])symTree[cat]=[];
        jobs.push(entry.async("base64").then(b64=>{
          const dataUrl="data:image/png;base64,"+b64;
          const img=new Image();img.src=dataUrl;
          spriteCache.set(relPath,{dataUrl,img});
          symTree[cat].push(relPath);
        }));
      });
      await Promise.all(jobs);
      for(const cat of Object.keys(symTree)) symTree[cat].sort();
      buildBrowserUI();
    }catch(e){alert("ZIP konnte nicht gelesen werden: "+e.message);}
  };
  reader.readAsArrayBuffer(file);
}

function buildBrowserUI(){
  const catsEl=document.getElementById("sym-cats");
  const gridWrap=document.getElementById("sym-grid-wrap");
  document.getElementById("sym-load-hint").style.display="none";
  catsEl.innerHTML="";
  const topCats=[...new Set(Object.keys(symTree).map(k=>k.split("/")[0]))].sort();
  const groups={};
  for(const cat of Object.keys(symTree)){const top=cat.split("/")[0];if(!groups[top])groups[top]=[];groups[top].push(cat);}
  let first=true;
  for(const top of topCats){
    if(!first){const sep=document.createElement("div");sep.className="sym-cat-sep";catsEl.appendChild(sep);}first=false;
    for(const cat of(groups[top]||[])){
      const btn=document.createElement("button");btn.className="sym-cat-btn";
      btn.dataset.cat=cat;btn.textContent=CATNAMES[cat]||cat;
      btn.addEventListener("click",()=>showCategory(cat));
      catsEl.appendChild(btn);
    }
  }
  // Show first category
  const firstCat=Object.keys(symTree)[0];if(firstCat)showCategory(firstCat);
}

function showCategory(cat){
  activeCat=cat;
  document.querySelectorAll(".sym-cat-btn").forEach(b=>b.classList.toggle("active",b.dataset.cat===cat));
  filterAndRender();
}

function filterAndRender(){
  const q=(document.getElementById("sym-search").value||"").toLowerCase();
  const gridWrap=document.getElementById("sym-grid-wrap");
  gridWrap.innerHTML="";
  if(!Object.keys(symTree).length)return;
  // Determine which cats to show
  let catsToShow=activeCat?[activeCat]:Object.keys(symTree);
  if(q){catsToShow=Object.keys(symTree);}
  let any=false;
  for(const cat of catsToShow){
    const paths=(symTree[cat]||[]).filter(p=>!q||p.toLowerCase().includes(q));
    if(!paths.length)continue;any=true;
    const hdr=document.createElement("div");hdr.className="sym-group-hdr";hdr.textContent=CATNAMES[cat]||cat;gridWrap.appendChild(hdr);
    const grid=document.createElement("div");grid.className="sym-grid";
    for(const path of paths){
      const btn=document.createElement("button");btn.className="sym-img-btn"+(path===selectedSpritePath?" selected":"");
      btn.title=path.split("/").pop().replace(/\.png$/i,"");
      const cached=spriteCache.get(path);
      if(cached){const img=document.createElement("img");img.src=cached.dataUrl;btn.appendChild(img);}
      btn.addEventListener("click",()=>selectSprite(path));
      grid.appendChild(btn);
    }
    gridWrap.appendChild(grid);
  }
  if(!any){const m=document.createElement("div");m.className="sym-load-hint";m.textContent="Keine Symbole gefunden.";gridWrap.appendChild(m);}
}

function selectSprite(path){
  selectedSpritePath=path;
  const cached=spriteCache.get(path);
  selectedSpriteDataUrl=cached?cached.dataUrl:null;
  document.querySelectorAll(".sym-img-btn").forEach(b=>b.classList.toggle("selected",b.title===path.split("/").pop().replace(/\.png$/i,"")));
  const wrap=document.getElementById("sym-active-wrap");
  const img=document.getElementById("sym-active-img");
  const name=document.getElementById("sym-active-name");
  if(cached){img.src=cached.dataUrl;name.textContent=path.split("/").pop().replace(/\.png$/i,"");wrap.style.display="flex";}
  // Close browser, switch to sprite tool
  document.getElementById("sym-overlay").classList.remove("open");
  setTool("sprite");
  render();
}

document.getElementById("sym-close").addEventListener("click",()=>document.getElementById("sym-overlay").classList.remove("open"));
document.getElementById("sym-overlay").addEventListener("click",e=>{if(e.target===document.getElementById("sym-overlay"))document.getElementById("sym-overlay").classList.remove("open");});
document.getElementById("sym-zip-btn").addEventListener("click",()=>document.getElementById("sym-zip-input").click());
document.getElementById("sym-zip-input").addEventListener("change",e=>{const f=e.target.files[0];if(f)loadSymbolZip(f);e.target.value="";});
document.getElementById("sym-search").addEventListener("input",filterAndRender);

setTool("select");renderLevels();resize();updateZoomLabel();refreshPanel();
</script>
